name: cmake on ubuntu platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: |
        bash ./script/build.sh
        tar -czvf core-parser_26.6.8.tar.gz output/aosp/debug/linux/bin/core-parser

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: core-parser_26.6.8_for_ubuntu.tar.gz
        path: core-parser_26.6.8.tar.gz
