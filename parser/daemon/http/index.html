<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>core-parser</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a1a;
  color: #d4d4d4;
  font-family: 'Courier New', Courier, monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#hdr {
  background: #252525;
  border-bottom: 1px solid #3e3e3e;
  padding: 9px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#hdr-title {
  font-size: 15px;
  color: #4ec9b0;
  font-weight: bold;
  white-space: nowrap;
}
#hdr-title span { color: #888; font-weight: normal; }
#hdr-info {
  font-size: 11px;
  color: #777;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: 8px;
}

.btn-sm {
  background: transparent;
  color: #888;
  border: 1px solid #444;
  border-radius: 3px;
  padding: 3px 9px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  white-space: nowrap;
}
.btn-sm:hover { color: #d4d4d4; border-color: #666; }

#msgs {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#msgs::-webkit-scrollbar { width: 6px; }
#msgs::-webkit-scrollbar-track { background: #1a1a1a; }
#msgs::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

.msg { display: flex; flex-direction: column; max-width: 92%; }
.msg.u { align-self: flex-end; }
.msg.b, .msg.e, .msg.l { align-self: flex-start; }

.msg-lbl {
  font-size: 10px;
  color: #555;
  margin-bottom: 3px;
  padding: 0 2px;
}
.msg.u .msg-lbl { text-align: right; color: #2a6090; }

.msg-body {
  border-radius: 5px;
  padding: 7px 11px;
  font-size: 12.5px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-all;
  border: 1px solid transparent;
}
.msg.u .msg-body { background: #1b3754; border-color: #254f7a; color: #9cdcfe; }
.msg.b .msg-body { background: #222;    border-color: #383838; color: #d4d4d4; }
.msg.e .msg-body { background: #2a1a1a; border-color: #6e3030; color: #f48771; }
.msg.l .msg-body { color: #555; font-style: italic; }

#iarea {
  border-top: 1px solid #3e3e3e;
  background: #252525;
  padding: 9px 12px;
  display: flex;
  gap: 7px;
  align-items: flex-end;
  flex-shrink: 0;
}
#prompt {
  color: #4ec9b0;
  font-size: 14px;
  padding-bottom: 7px;
  user-select: none;
}
#inp {
  flex: 1;
  background: #1a1a1a;
  border: 1px solid #4a4a4a;
  border-radius: 4px;
  color: #d4d4d4;
  font-family: inherit;
  font-size: 12.5px;
  padding: 7px 10px;
  resize: none;
  min-height: 34px;
  max-height: 110px;
  overflow-y: auto;
  outline: none;
  line-height: 1.4;
}
#inp:focus { border-color: #4ec9b0; }
#inp::placeholder { color: #555; }

#sbtn {
  background: #0d6b5c;
  color: #d4d4d4;
  border: none;
  border-radius: 4px;
  padding: 7px 15px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12.5px;
  white-space: nowrap;
  transition: background .15s;
}
#sbtn:hover { background: #0f8870; }
#sbtn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-title">&#9654; core-parser <span>interactive</span></div>
  <div id="hdr-info">loading&#8230;</div>
  <button class="btn-sm" onclick="runCmd('help', true)">help</button>
  <button class="btn-sm" onclick="clearMsgs()">clear</button>
</div>

<div id="msgs"></div>

<div id="iarea">
  <span id="prompt">&gt;</span>
  <textarea id="inp" rows="1"
    placeholder="Enter command&#8230; (Enter = send, Shift+Enter = newline)"></textarea>
  <button id="sbtn" onclick="sendCmd()">Send</button>
</div>

<script>
var msgs = document.getElementById('msgs');
var inp  = document.getElementById('inp');
var sbtn = document.getElementById('sbtn');
var busy = false;
var hist = [], hIdx = -1;

function addMsg(cls, text, lbl) {
  var d = document.createElement('div');
  d.className = 'msg ' + cls;
  if (lbl) {
    var l = document.createElement('div');
    l.className = 'msg-lbl';
    l.textContent = lbl;
    d.appendChild(l);
  }
  var b = document.createElement('div');
  b.className = 'msg-body';
  b.textContent = text;
  d.appendChild(b);
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

async function runCmd(cmd, showUser, silent) {
  if (showUser) addMsg('u', cmd, 'you');
  var ld = silent ? null : addMsg('l', 'running\u2026', '');
  try {
    var r = await fetch('/core-parser?cmd=' + encodeURIComponent(cmd));
    var j = await r.json();
    if (ld) ld.remove();
    if (!silent) addMsg('b', j.result || '(empty output)', 'core-parser');
    return j.result || '';
  } catch (e) {
    if (ld) ld.remove();
    if (!silent) addMsg('e', 'Error: ' + e.message, 'core-parser');
  }
  return '';
}

async function updateHeader() {
  var info = await runCmd('env', false, true);
  var lines = (info || '').split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
  // "Core env:" is lines[0]; "* Path: /..." is lines[1]
  var path = '';
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].indexOf('* Path:') >= 0) {
      path = lines[i].replace('* Path:', '').trim();
      break;
    }
  }
  document.getElementById('hdr-info').textContent = path || 'no core loaded';
}

async function sendCmd() {
  var cmd = inp.value.trim();
  if (!cmd || busy) return;
  busy = true;
  sbtn.disabled = true;
  if (hist[hist.length - 1] !== cmd) hist.push(cmd);
  hIdx = -1;
  inp.value = '';
  inp.style.height = 'auto';
  await runCmd(cmd, true);
  await updateHeader();
  busy = false;
  sbtn.disabled = false;
  inp.focus();
}

function clearMsgs() { msgs.innerHTML = ''; }

inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendCmd();
    return;
  }
  if (e.key === 'ArrowUp' && inp.value === '' && hist.length) {
    hIdx = hIdx < 0 ? hist.length - 1 : Math.max(0, hIdx - 1);
    inp.value = hist[hIdx];
    e.preventDefault();
    return;
  }
  if (e.key === 'ArrowDown' && hIdx >= 0) {
    hIdx++;
    inp.value = hIdx < hist.length ? hist[hIdx] : '';
    if (hIdx >= hist.length) hIdx = -1;
    e.preventDefault();
  }
});

inp.addEventListener('input', function() {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
});

(async function init() {
  await updateHeader();

  var w = 'Copyright (C) 2024-present, Guanyou.Chen. All rights reserved.\n\n'
    + 'Licensed under the Apache License, Version 2.0 (the "License");\n'
    + 'you may not use this file except in compliance with the License.\n'
    + 'You may obtain a copy of the License at\n\n'
    + '     http://www.apache.org/licenses/LICENSE-2.0\n\n'
    + 'Unless required by applicable law or agreed to in writing, software\n'
    + 'distributed under the License is distributed on an "AS IS" BASIS,\n'
    + 'WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.\n'
    + 'See the License for the specific language governing permissions and\n'
    + 'limitations under the License.\n\n'
    + 'For bug reporting instructions, please see:\n'
    + '     https://github.com/Penguin38/OpenCoreAnalysisKit\n\n'
    + '+-----------------------------------------------------------------+\n'
    + '| SDK           |  arm64  |   arm   |  x86_64 |   x86   | riscv64 |\n'
    + '|---------------|---------|---------|---------|---------|---------|\n'
    + '| AOSP-5.0 (21) |    x    |    x    |    x    |    x    |    ?    |\n'
    + '| AOSP-5.1 (22) |    x    |    x    |    x    |    x    |    ?    |\n'
    + '| AOSP-6.0 (23) |    x    |    x    |    x    |    x    |    ?    |\n'
    + '| AOSP-7.0 (24) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-7.1 (25) |    -    |    -    |    -    |    -    |    -    |\n'
    + '| AOSP-8.0 (26) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-8.1 (27) |    -    |    -    |    -    |    -    |    -    |\n'
    + '| AOSP-9.0 (28) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-10.0(29) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-11.0(30) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-12.0(31) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-12.1(32) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-13.0(33) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-14.0(34) |    \u221a    |    \u221a    |    \u221a    |    \u221a    |    ?    |\n'
    + '| AOSP-15.0(35) |    \u221a    |    -    |    \u221a    |    -    |    ?    |\n'
    + '| AOSP-16.0(36) |    \u221a    |    -    |    \u221a    |    -    |    ?    |\n'
    + '| AOSP-17.0(37) |    \u221a    |    -    |    \u221a    |    -    |    ?    |\n'
    + '+-----------------------------------------------------------------+\n\n'
    + 'Type "help" to list all available commands.';
  addMsg('b', w, 'core-parser');
  inp.focus();
})();
</script>
</body>
</html>
